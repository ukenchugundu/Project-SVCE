version: '3.8'

services:
  # PostgreSQL Database
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: eduhub-db
    environment:
      POSTGRES_DB: eduhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eduhub-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduhub-backend
    environment:
      DATABASE_URL: postgresql://postgres:password@database:5432/eduhub
      DB_SSL: "false"
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - database
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - eduhub-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eduhub-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - eduhub-network

volumes:
  postgres_data:

networks:
  eduhub-network:
    driver: bridge