services:
  # PostgreSQL Database
  - name: eduhub-db
    database:
      name: eduhub
      plan: free
    postgresVersion: 15
    region: oregon

  # Backend API Service
  - name: eduhub-backend
    region: oregon
    plan: free
    type: web
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node dist/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eduhub-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: PORT
        value: "3000"
    healthCheckPath: /api

  # Frontend Static Site
  - name: eduhub-frontend
    region: oregon
    plan: free
    type: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://eduhub-backend.onrender.com

